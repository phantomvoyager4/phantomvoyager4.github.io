<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite App</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app"></div>
<h1>Lista Artykułów</h1>
    <div id="articles" class="articles-container">
        <p class="loading">Ładowanie artykułów...</p>
    </div>

    <hr>

    <h2 class="font-bold">Dodaj Nowy Artykuł</h2>
    <form id="article-form">
        <div>
            <label for="title" class="font-bold">Tytuł:</label>
            <input type="text" id="title" name="title"  required>
        </div>
        <div>
            <label for="subtitle" class="font-bold">Podtytuł:</label>
            <input type="text" id="subtitle" name="subtitle" required>
        </div>
        <div>
            <label for="author" class="font-bold">Autor:</label>
            <input type="text" id="author" name="author" required>
        </div>
        <div>
            <label for="content" class="font-bold">Treść:</label>
            <textarea id="content" name="content" required></textarea>
        </div>
        <button type="submit" class="font-bold bg-gray-400">Dodaj Artykuł</button>
    </form>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
